<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="14" fill="#1e293b"/>
  <!-- Hash grid lines -->
  <line x1="22" y1="8" x2="22" y2="56" stroke="#818cf8" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="42" y1="8" x2="42" y2="56" stroke="#818cf8" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="8" y1="22" x2="56" y2="22" stroke="#818cf8" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="8" y1="42" x2="56" y2="42" stroke="#818cf8" stroke-width="3.5" stroke-linecap="round"/>
  <!-- X in top-left cell -->
  <line x1="12" y1="12" x2="19" y2="19" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="19" y1="12" x2="12" y2="19" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round"/>
  <!-- O in center cell -->
  <circle cx="32" cy="32" r="5" stroke="#f472b6" stroke-width="2.5" fill="none"/>
  <!-- X in bottom-right cell -->
  <line x1="45" y1="45" x2="52" y2="52" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="52" y1="45" x2="45" y2="52" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round"/>
</svg>
